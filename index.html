<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little306 App Store Repo</title>

<style>
:root{
  --bg1:#00d0ff;
  --bg2:#00101f;
  --card:rgba(255,255,255,0.08);
  --text:#fff;
  --main:#00c8ff;
}

body.light{
  --bg1:#eaf7ff;
  --bg2:#ffffff;
  --card:rgba(0,0,0,0.05);
  --text:#111;
  --main:#0077ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
min-height:100vh;
overflow-x:hidden;
}

/* TOP NAV */
header{
position:sticky;
top:0;
z-index:10;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
backdrop-filter:blur(14px);
background:rgba(0,0,0,0.25);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo-box{
width:44px;
height:44px;
border-radius:14px;
background:linear-gradient(135deg,#00c8ff,#0066ff);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
box-shadow:0 0 18px #00c8ff;
}

/* SEARCH */
.search{
display:flex;
padding:10px;
gap:8px;
}

.search input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
outline:none;
}

.search button{
padding:12px;
border:none;
border-radius:12px;
background:var(--main);
color:#fff;
font-weight:600;
}

/* FEATURE CARD (LIKE APP STORE BANNER) */
.feature{
margin:10px;
padding:18px;
border-radius:18px;
background:var(--card);
backdrop-filter:blur(15px);
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.25);
}

/* APP LIST */
.grid{
display:grid;
grid-template-columns:1fr;
gap:12px;
padding:10px;
padding-bottom:90px;
}

.app{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
border-radius:18px;
background:var(--card);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
transition:.2s;
}

.app:active{
transform:scale(0.98);
}

.left{
display:flex;
align-items:center;
gap:10px;
}

.icon{
width:42px;
height:42px;
border-radius:12px;
background:linear-gradient(135deg,#00c8ff,#0050ff);
box-shadow:0 0 12px #00c8ff;
}

.btn{
padding:10px 14px;
border:none;
border-radius:12px;
background:var(--main);
color:#fff;
font-weight:700;
}

/* BOTTOM TAB BAR */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
justify-content:space-around;
padding:10px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(12px);
}

.bottom div{
font-size:12px;
text-align:center;
opacity:0.9;
}

/* BUTTON ANIM */
button:active{
transform:scale(0.95);
}
</style>
</head>

<body>

<header>
<div class="logo">
<div class="logo-box">L306</div>
<h3>App Store Repo</h3>
</div>

<button onclick="document.body.classList.toggle('light')" 
style="padding:8px 10px;border:none;border-radius:10px;background:var(--main);color:#fff;">
Mode
</button>
</header>

<div class="feature">
<h2>🍎 iOS Repo Experience</h2>
<p>Giao diện kiểu App Store • mượt • đẹp • tối ưu mobile</p>
</div>

<div class="search">
<input id="search" onkeyup="filter()" placeholder="Tìm ứng dụng...">
<button>Tìm</button>
</div>

<div class="grid" id="list">

<div class="app">
<div class="left">
<div class="icon"></div>
<div>
<b>TrollStore</b><br>
<small>Permanent install IPA</small>
</div>
</div>
<button class="btn">Tải</button>
</div>

<div class="app">
<div class="left">
<div class="icon"></div>
<div>
<b>ESign</b><br>
<small>Ký IPA dễ dàng</small>
</div>
</div>
<button class="btn">Tải</button>
</div>

<div class="app">
<div class="left">
<div class="icon"></div>
<div>
<b>Scarlet</b><br>
<small>Cài IPA miễn phí</small>
</div>
</div>
<button class="btn">Tải</button>
</div>

<div class="app">
<div class="left">
<div class="icon"></div>
<div>
<b>Roothide</b><br>
<small>Bypass / tweak tools</small>
</div>
</div>
<button class="btn">Xem</button>
</div>

<div class="app">
<div class="left">
<div class="icon"></div>
<div>
<b>IPA Library</b><br>
<small>Kho ứng dụng iOS</small>
</div>
</div>
<button class="btn">Xem</button>
</div>

</div>

<div class="bottom">
<div>🏠 Home</div>
<div>📦 Repo</div>
<div>📱 Apps</div>
<div>⚙️ Settings</div>
</div>

<script>
function filter(){
let val=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".app").forEach(a=>{
a.style.display=a.innerText.toLowerCase().includes(val)?"flex":"none";
});
}
</script>

</body>
</html>
