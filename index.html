<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little306 Repo PRO</title>

<style>
:root{
  --bg1:#00c6ff;
  --bg2:#001533;
  --card:rgba(255,255,255,0.08);
  --text:#fff;
  --btn:#00c8ff;
}

body.light{
  --bg1:#eaf7ff;
  --bg2:#ffffff;
  --card:rgba(0,0,0,0.05);
  --text:#111;
  --btn:#0077ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
overflow-x:hidden;
}

/* ANIMATION LOAD */
body{
animation:fadeIn .6s ease;
}
@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo-box{
width:44px;
height:44px;
border-radius:14px;
background:linear-gradient(135deg,#00c8ff,#0066ff);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
box-shadow:0 0 18px #00c8ff;
}

.toggle{
padding:8px 12px;
border:none;
border-radius:10px;
background:var(--btn);
color:white;
font-size:12px;
}

.banner{
margin:10px;
padding:18px;
border-radius:18px;
background:var(--card);
backdrop-filter:blur(15px);
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.2);
}

.search{
display:flex;
gap:8px;
padding:10px;
}

.search input{
flex:1;
padding:12px;
border-radius:12px;
border:none;
outline:none;
}

.search button{
padding:12px;
border:none;
border-radius:12px;
background:var(--btn);
color:white;
font-weight:600;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr;
gap:12px;
padding:10px;
}

.card{
background:var(--card);
backdrop-filter:blur(15px);
border-radius:18px;
padding:15px;
border:1px solid rgba(255,255,255,0.1);
text-align:center;
position:relative;
overflow:hidden;
transition:.2s;
}

.card:hover{
transform:scale(1.02);
box-shadow:0 0 20px var(--btn);
}

.card button{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:var(--btn);
color:white;
font-weight:700;
cursor:pointer;
transition:.2s;
}

/* RIPPLE EFFECT */
.card button:active{
transform:scale(0.96);
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
font-size:12px;
opacity:0.7;
}
</style>
</head>

<body>

<header>
<div class="logo">
<div class="logo-box">L306</div>
<h3>Little306 Repo PRO</h3>
</div>

<button class="toggle" onclick="document.body.classList.toggle('light')">
Mode
</button>
</header>

<div class="banner">
<h2>🔥 Little306 Repo</h2>
<p>Kho IPA • Cài nhanh • Giao diện PRO</p>
</div>

<div class="search">
<input placeholder="Tìm ứng dụng...">
<button>Tìm</button>
</div>

<div class="grid">

<div class="card">
<h3>📦 Thêm Repo</h3>
<button onclick="copyRepo()">Copy Repo</button>
</div>

<div class="card">
<h3>📱 Kho IPA</h3>
<button>Xem</button>
</div>

<div class="card">
<h3>🚀 TrollStore</h3>
<button>Tải</button>
</div>

<div class="card">
<h3>✍️ ESign</h3>
<button>Tải</button>
</div>

<div class="card">
<h3>🔥 Scarlet</h3>
<button>Tải</button>
</div>

<div class="card">
<h3>🛠 Roothide</h3>
<button>Xem</button>
</div>

<div class="card">
<h3>📚 Hướng dẫn</h3>
<button>Đọc</button>
</div>

<div class="card">
<h3>💬 Telegram</h3>
<button>Mở</button>
</div>

<div class="card">
<h3>❤️ Donate</h3>
<button>Ủng hộ</button>
</div>

</div>

<div class="footer">
Little306 Repo PRO © 2026
</div>

<script>
function copyRepo(){
navigator.clipboard.writeText("https://little306.github.io/repo");
alert("Đã copy link repo!");
}
</script>

</body>
</html>
