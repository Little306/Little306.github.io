<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVH REPO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{
background:linear-gradient(135deg,#00aaff,#00152f,#000814);
min-height:100vh;padding:15px;transition:.3s;
}
body.light{background:linear-gradient(135deg,#eef8ff,#cfe7ff)}
.container{
max-width:500px;margin:auto;padding:20px;border-radius:30px;
background:rgba(3,10,25,.85);
backdrop-filter:blur(30px);
border:3px solid rgba(0,220,255,.7);
box-shadow:0 0 20px rgba(0,220,255,.5),0 0 60px rgba(0,120,255,.35);
}
.logo{text-align:center;font-size:48px;font-weight:900;color:#fff;text-shadow:0 0 10px #00c8ff,0 0 25px #00c8ff}
.subtitle{text-align:center;color:#d9e4f2;margin-top:8px}
.desc{display:flex;gap:10px;justify-content:center;width:max-content;margin:15px auto;padding:10px 18px;background:rgba(255,255,255,.08);border-radius:30px;color:#28d8ff}
.blink{width:12px;height:12px;background:#00ff66;border-radius:50%;animation:blink 1s infinite}
@keyframes blink{50%{opacity:.2}}
.darkbtn,.btn,.repo-box,.contact,.donate-box,.glass-row{
background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15)
}
.darkbtn,.btn{height:44px;display:flex;align-items:center;justify-content:center;border-radius:16px;color:#fff;cursor:pointer}
.section{margin:18px 0 10px;color:#28d8ff;font-weight:800}
.repo-box{display:flex;gap:8px;padding:8px;border-radius:16px}
.repo-link{flex:1;color:#fff;padding:10px}
.copy,.copy-stk{
padding:0 16px;border-radius:12px;border:1px solid rgba(0,220,255,.4);
background:rgba(0,200,255,.35);color:#fff;cursor:pointer
}
.btn{justify-content:space-between;padding:0 16px;text-decoration:none;margin-top:10px}
.contact,.donate-box,.glass-row{padding:16px;border-radius:16px;color:#fff;margin-top:10px}
.footer{text-align:center;margin-top:18px;color:#d0d9e6}
body.light .container{background:#fff}
body.light .logo,body.light .repo-link,body.light .contact,body.light .donate-box,body.light .glass-row,body.light .btn,body.light .darkbtn,.body.light .footer{color:#111}
body.light .repo-box,body.light .contact,body.light .donate-box,body.light .glass-row,body.light .btn,body.light .darkbtn{background:#f7fbff}
</style>
</head>
<body>
<div class="container">
<div class="logo">NVH REPO</div>
<div class="subtitle">Kho tweak Crack – Việt Hoá</div>
<div class="desc"><div class="blink"></div>JAILBREAK • CÔNG NGHỆ</div>
<div class="darkbtn" onclick="toggleMode()" id="mode">🌙 Đang dùng Dark Mode</div>
</div>
<script>
function toggleMode(){
document.body.classList.toggle('light');
document.getElementById('mode').innerHTML=document.body.classList.contains('light')?'☀️ Đang dùng Light Mode':'🌙 Đang dùng Dark Mode';
}
</script>
</body>
</html>
